name: CI

on:
  push:
    tags: ['*']

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu Release
            os: ubuntu-latest
            build_type: Release
          - name: macOS Release
            os: macos-latest
            build_type: Release

    steps:
      - uses: actions/checkout@v4
        with:
          path: trading_engine

      - name: Checkout libchronos-deps
        uses: actions/checkout@v4
        with:
          repository: leafxuzm/libchronos-deps
          path: libchronos-deps

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential libboost-dev libssl-dev libzmq3-dev pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake boost openssl zeromq pkg-config

      - name: Configure
        working-directory: trading_engine
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        working-directory: trading_engine/build
        run: make -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 4)

      - name: Smoke test (replay mode)
        working-directory: trading_engine/build
        run: |
          ./generate_demo_logs
          ./trading_engine --config=../config/example.yaml --replay=/tmp/chronos_demo_logs
